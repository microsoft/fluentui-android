on: workflow_dispatch

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  Localize:
    runs-on: ubuntu-22.04
    environment: Auth

    steps:
    - uses: actions/checkout@v3

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        allow-no-subscriptions: true

    - name: Get access token
      id: get-token
      run: |
            TOKEN=$(az account get-access-token \
              --resource "https://microsoft.onmicrosoft.com/tdb-touchdownbuild-prod" \
              --query accessToken -o tsv)
            echo "::add-mask::$TOKEN"
            echo "TD_ACCESS_TOKEN=$TOKEN" >> "$GITHUB_ENV"
    - shell: bash
      name: Localize
      env:
        TDBUILD_TEAM_ID: ${{ secrets.TDBUILD_TEAM_ID }}
        TD_ACCESS_TOKEN: ${{ env.TD_ACCESS_TOKEN }}
      run: ./localize.sh
    - name: Create Pull Request
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        set -e
        echo "Start."
        # Configure git and Push updates
        git config --global user.email ${{ secrets.EMAIL }}
        git config --global user.name ${{ secrets.NAME }}
        git config pull.rebase false
        branch=Localize-$GITHUB_RUN_ID
        message='TDBuild Localization'
        echo "Creating branch $branch"
        git branch $branch
        echo "Checkout $branch"
        git checkout $branch
        # Add / update and commit
        git add .
        if [[ `git status --porcelain` ]]; then
            echo "Adding git commit"
            git commit -m 'Adding localized files'
            echo "Pushing to origin"
            git push origin $branch
            echo "Creating PR"
            gh api \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                /repos/${GITHUB_REPOSITORY}/pulls \
                -f title="$message" \
              -f body="Localized files" \
              -f head="$branch" \
              -f base='master'
        else
            echo "No changes since last run"
        fi
